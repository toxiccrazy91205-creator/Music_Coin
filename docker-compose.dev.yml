services:
  postgres:
    image: postgres:16
    container_name: music-coin-db-dev
    environment:
      POSTGRES_USER: musiccoin
      POSTGRES_PASSWORD: musiccoin_pass
      POSTGRES_DB: music_coin_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musiccoin -d music_coin_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20-alpine
    container_name: music-coin-app-dev
    working_dir: /app
    command: >
      sh -c "corepack enable pnpm && pnpm i && pnpm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - DATABASE_URL=postgresql://musiccoin:musiccoin_pass@postgres:5432/music_coin_demo?schema=public
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_dev:
  node_modules:
  next_cache:
